<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WiFi网络配置</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 500px;
            width: 100%;
        }

        h1 {
            color: #333;
            margin-bottom: 30px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
        }

        .wifi-icon {
            font-size: 4em;
            margin-bottom: 20px;
            color: #2196F3;
        }

        .form-group {
            margin: 20px 0;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #333;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 1em;
            transition: border-color 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: #2196F3;
            box-shadow: 0 0 5px rgba(33, 150, 243, 0.3);
        }

        .password-toggle {
            position: relative;
        }

        .password-toggle input {
            padding-right: 50px;
        }

        .toggle-btn {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1.2em;
            color: #666;
        }

        .scan-btn {
            background: linear-gradient(145deg, #4CAF50, #45a049);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 12px 24px;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 20px;
        }

        .scan-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }

        .scan-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .network-list {
            max-height: 200px;
            overflow-y: auto;
            border: 2px solid #ddd;
            border-radius: 8px;
            margin: 20px 0;
            display: none;
        }

        .network-item {
            padding: 12px;
            border-bottom: 1px solid #eee;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        .network-item:hover {
            background-color: #f5f5f5;
        }

        .network-item:last-child {
            border-bottom: none;
        }

        .network-name {
            font-weight: bold;
            color: #333;
        }

        .network-signal {
            color: #666;
            font-size: 0.9em;
        }

        .submit-btn {
            background: linear-gradient(145deg, #2196F3, #1976D2);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 15px 30px;
            font-size: 1.2em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
            margin-top: 20px;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(33, 150, 243, 0.3);
        }

        .submit-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .message {
            margin: 15px 0;
            padding: 12px;
            border-radius: 8px;
            font-weight: bold;
            display: none;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .message.info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }

        .loading {
            display: none;
            text-align: center;
            margin: 20px 0;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #2196F3;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .status-info {
            background: rgba(0, 0, 0, 0.05);
            border-radius: 10px;
            padding: 15px;
            margin: 20px 0;
            text-align: left;
        }

        .status-item {
            display: flex;
            justify-content: space-between;
            margin: 5px 0;
            font-weight: bold;
        }

        .status-value {
            color: #2196F3;
        }

        .back-btn {
            background: linear-gradient(145deg, #9E9E9E, #757575);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 10px 20px;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 20px;
        }

        .back-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }

        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }
            
            h1 {
                font-size: 2em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="wifi-icon">📶</div>
        <h1>WiFi网络配置</h1>
        
        <div class="message" id="message"></div>
        
        <div class="status-info">
            <h3>📊 当前状态</h3>
            <div class="status-item">
                <span>网络模式:</span>
                <span class="status-value" id="networkMode">AP模式</span>
            </div>
            <div class="status-item">
                <span>AP名称:</span>
                <span class="status-value">orangepi</span>
            </div>
            <div class="status-item">
                <span>AP密码:</span>
                <span class="status-value">orangepi</span>
            </div>
        </div>

        <button class="back-btn" onclick="goBack()">← 返回控制面板</button>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>正在扫描可用网络...</p>
        </div>

        <button class="scan-btn" id="scanBtn" onclick="scanNetworks()">
            🔍 扫描可用网络
        </button>

        <div class="network-list" id="networkList">
            <!-- 网络列表将在这里动态生成 -->
        </div>

        <form id="wifiForm">
            <div class="form-group">
                <label for="ssid">WiFi网络名称 (SSID):</label>
                <input type="text" id="ssid" name="ssid" placeholder="请输入WiFi网络名称" required>
            </div>

            <div class="form-group">
                <label for="password">WiFi密码:</label>
                <div class="password-toggle">
                    <input type="password" id="password" name="password" placeholder="请输入WiFi密码" required>
                    <button type="button" class="toggle-btn" onclick="togglePassword()">👁️</button>
                </div>
            </div>

            <button type="submit" class="submit-btn" id="submitBtn">
                🔧 配置WiFi并关闭AP
            </button>
        </form>

        <div class="status-info">
            <h3>💡 使用说明</h3>
            <p>1. 点击"扫描可用网络"查看附近的WiFi网络</p>
            <p>2. 选择要连接的网络，或手动输入网络名称</p>
            <p>3. 输入正确的WiFi密码</p>
            <p>4. 点击"配置WiFi并关闭AP"完成配置</p>
            <p>5. 配置过程中系统会自动重启，请等待重启完成</p>
            <p>6. 重启后，机器人将连接到新的WiFi网络</p>
            <p>7. 使用新的IP地址访问机器人控制界面</p>
        </div>
    </div>

    <script>
        let isScanning = false;

        // 显示消息
        function showMessage(message, type = 'success') {
            const messageEl = document.getElementById('message');
            messageEl.textContent = message;
            messageEl.className = `message ${type}`;
            messageEl.style.display = 'block';
            
            setTimeout(() => {
                messageEl.style.display = 'none';
            }, 5000);
        }

        // 切换密码显示
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const toggleBtn = document.querySelector('.toggle-btn');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleBtn.textContent = '🙈';
            } else {
                passwordInput.type = 'password';
                toggleBtn.textContent = '👁️';
            }
        }

        // 扫描网络
        async function scanNetworks() {
            if (isScanning) return;
            
            isScanning = true;
            const scanBtn = document.getElementById('scanBtn');
            const loading = document.getElementById('loading');
            const networkList = document.getElementById('networkList');
            
            scanBtn.disabled = true;
            scanBtn.textContent = '扫描中...';
            loading.style.display = 'block';
            networkList.style.display = 'none';
            
            try {
                const response = await fetch('/api/scan_wifi', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    }
                });

                const result = await response.json();
                
                if (result.success) {
                    displayNetworks(result.data);
                    showMessage('网络扫描完成', 'success');
                } else {
                    showMessage(result.message, 'error');
                }
            } catch (error) {
                showMessage('扫描网络失败: ' + error.message, 'error');
            } finally {
                isScanning = false;
                scanBtn.disabled = false;
                scanBtn.textContent = '🔍 扫描可用网络';
                loading.style.display = 'none';
            }
        }

        // 显示网络列表
        function displayNetworks(networks) {
            const networkList = document.getElementById('networkList');
            
            if (networks.length === 0) {
                networkList.innerHTML = '<div class="network-item">未发现可用网络</div>';
            } else {
                networkList.innerHTML = networks.map(network => `
                    <div class="network-item" onclick="selectNetwork('${network.ssid}')">
                        <div class="network-name">${network.ssid}</div>
                        <div class="network-signal">信号强度: ${network.signal}%</div>
                    </div>
                `).join('');
            }
            
            networkList.style.display = 'block';
        }

        // 选择网络
        function selectNetwork(ssid) {
            document.getElementById('ssid').value = ssid;
            document.getElementById('networkList').style.display = 'none';
            showMessage(`已选择网络: ${ssid}`, 'info');
        }

        // 提交WiFi配置
        document.getElementById('wifiForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const submitBtn = document.getElementById('submitBtn');
            const ssid = document.getElementById('ssid').value;
            const password = document.getElementById('password').value;
            
            if (!ssid || !password) {
                showMessage('请填写完整的WiFi信息', 'error');
                return;
            }
            
            submitBtn.disabled = true;
            submitBtn.textContent = '配置中...';
            
            try {
                const response = await fetch('/api/configure_wifi', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        ssid: ssid,
                        password: password
                    })
                });

                const result = await response.json();
                
                if (result.success) {
                    showMessage('WiFi配置已启动！系统将自动重启...', 'success');
                    
                    // 显示倒计时和提示
                    let countdown = 15;
                    const countdownInterval = setInterval(() => {
                        submitBtn.textContent = `配置中...${countdown}秒后重启`;
                        countdown--;
                        
                        if (countdown < 0) {
                            clearInterval(countdownInterval);
                            showMessage('系统正在重启，请等待重启完成后用新IP访问', 'info');
                            submitBtn.textContent = '系统重启中...';
                            submitBtn.disabled = true;
                        }
                    }, 1000);
                    
                } else {
                    showMessage(result.message, 'error');
                    submitBtn.disabled = false;
                    submitBtn.textContent = '🔧 配置WiFi并关闭AP';
                }
            } catch (error) {
                showMessage('配置WiFi失败: ' + error.message, 'error');
                submitBtn.disabled = false;
                submitBtn.textContent = '🔧 配置WiFi并关闭AP';
            }
        });

        // 返回控制面板
        function goBack() {
            window.location.href = '/';
        }

        // 页面加载时显示当前状态
        window.addEventListener('load', () => {
            showMessage('当前处于AP模式，请配置WiFi网络', 'info');
        });
    </script>
</body>
</html>
