#两个轮子正反转5圈，然后除以5
#902
gen.add("pulses_per_wheel_turn_around",    int_t,    0, "An Integer parameter", 898,  0, 10000) #轮子转一圈的脉冲数

#弃用
#打开雷达（正常测导航的时候雷达是打开的，加上雷达抖动的影响），放在地面上，逆转5圈，顺转5圈
