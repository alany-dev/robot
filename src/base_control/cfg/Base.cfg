gen.add("max_pwm",              int_t,    0, "An Integer parameter", 6400,  0, 10000)
gen.add("pid_p",                double_t,    0, "An Integer parameter", 50,  0,  200)
gen.add("pid_i",                double_t,    0, "An Integer parameter", 0.1,  0,  200)
