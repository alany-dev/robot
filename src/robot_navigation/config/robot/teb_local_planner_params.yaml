TebLocalPlannerROS:
  # ========================== 基础话题配置 ==========================
  # 里程计话题名称（机器人位姿、速度来源）
  odom_topic: odom
    
  # ========================== 轨迹生成参数 ==========================
  # 自动调整轨迹的时间分辨率（步长）
  teb_autosize: True
  # 轨迹参考时间步长（单位：s）
  # 控制轨迹平滑度，值越大轨迹越稀疏，计算越快
  dt_ref: 0.3
  # 时间步长滞后阈值（单位：s）
  # 配合自动调整，防止步长频繁切换
  dt_hysteresis: 0.1
  # 覆盖全局路径的朝向信息
  # true：TEB自主规划最优朝向；false：严格跟随全局路径朝向
  global_plan_overwrite_orientation: True
  # 允许机器人初始阶段后退运动
  # 适配狭窄空间调头、脱困场景
  allow_init_with_backwards_motion: True
  # 全局路径前瞻距离（单位：m）
  # TEB只规划该范围内的局部路径，值越大视野越远
  max_global_plan_lookahead_dist: 3.0
  # 轨迹可行性检查的连续位姿数量
  # 检查连续N个位姿无碰撞，判定轨迹有效
  feasibility_check_no_poses: 2
    
  # ========================== 机器人运动学参数 ==========================
  # 机器人最大前进线速度（单位：m/s）
  # 低速配置，适配小型室内机器人
  max_vel_x: 0.1
  # 机器人最大后退线速度（单位：m/s）
  max_vel_x_backwards: 0.1
  # 机器人Y轴最大平移速度（单位：m/s）
  # 差分驱动机器人无侧移能力，固定为0
  max_vel_y: 0.0
  # 机器人最大旋转角速度（单位：rad/s）
  # 车形机器人受最小转弯半径限制，差分机器人无限制
  max_vel_theta: 1.0
  # 机器人X轴线加速度限制（单位：m/s²）
  # 小加速度保证低速启停平稳，无冲击
  acc_lim_x: 0.5
  # 机器人旋转角加速度限制（单位：rad/s²）
  acc_lim_theta: 0.5
  # 机器人最小转弯半径（单位：m）
  # 0.0 = 差分驱动机器人（支持原地旋转）；车形机器人需设置大于0的值
  min_turning_radius: 0.0
  # 机器人足迹模型（避障碰撞检测模型）
  footprint_model:
    # 模型类型：point(点) / circular(圆) / two_circles(双圆) / line(线) / polygon(多边形)
    # point：简化为点模型，计算量最小，适合小型差分机器人
    type: "point"

  # ========================== 目标点容忍度参数 ==========================
  # XY平面位置目标容忍度（单位：m）
  # 机器人与目标点距离小于该值，判定位置到达
  xy_goal_tolerance: 0.1
  # 航向角目标容忍度（单位：rad）
  # 朝向误差小于该值，判定姿态到达
  yaw_goal_tolerance: 0.2
  # 到达目标后是否允许自由速度
  # false：到达目标后速度归0；true：保持运动（极少用）
  free_goal_vel: False
    
  # ========================== 障碍物避障参数 ==========================
  # 机器人与障碍物的最小安全距离（单位：m）
  # 必须大于机器人半径，防止碰撞
  min_obstacle_dist: 0.10
  # 障碍物膨胀距离（单位：m）
  # 安全缓冲区域，提升避障可靠性
  inflation_dist : 0.20
  # 启用代价地图障碍物信息
  include_costmap_obstacles: True
  # 检测机器人后方障碍物的距离（单位：m）
  # 后退时避障有效范围
  costmap_obstacles_behind_robot_dist: 0.2
  # 轨迹受障碍物影响的离散位姿数量
  obstacle_poses_affected: 30
  # 代价地图转换器插件（默认空，使用内置转换）
  costmap_converter_plugin: ""
  # 代价地图转换使用独立线程
  costmap_converter_spin_thread: True
  # 代价地图转换频率（单位：Hz）
  costmap_converter_rate: 5

  # ========================== 轨迹优化参数（核心调参） ==========================
  # 内部优化迭代次数
  # 次数越高轨迹越优，计算量越大
  no_inner_iterations: 5
  # 外部优化迭代次数
  no_outer_iterations: 4
  # 启用轨迹优化
  optimization_activate: True
  # 关闭优化日志打印
  optimization_verbose: False
  # 优化惩罚项阈值
  penalty_epsilon: 0.1
  # 最大X方向速度权重
  weight_max_vel_x: 2
  # 最大旋转速度权重
  weight_max_vel_theta: 1
  # X方向加速度限制权重
  weight_acc_lim_x: 1
  # 旋转加速度限制权重
  weight_acc_lim_theta: 1
  # 非完整运动学约束权重（差分/车形机器人核心）
  # 极高权重（1000），强制机器人遵守差速运动规则
  weight_kinematics_nh: 1000
  # 前进驱动偏好权重
  # 机器人优先前进，而非后退
  weight_kinematics_forward_drive: 1
  # 最小转弯半径约束权重
  weight_kinematics_turning_radius: 1
  # 最短时间优化权重
  # 权重越高，机器人越倾向于快速到达目标
  weight_optimaltime: 1
  # 静态障碍物避障权重
  weight_obstacle: 50
  # 动态障碍物避障权重（暂未启用）
  weight_dynamic_obstacle: 10

  # ========================== 同伦类路径规划参数 ==========================
  # 启用同伦类规划（多轨迹并行规划）
  # false：关闭，降低CPU消耗，适配低配硬件
  enable_homotopy_class_planning: False
  # 启用多线程
  enable_multithreading: True
  # 简单探索模式
  simple_exploration: False
  # 最大同伦类数量
  max_number_classes: 2
  # 路径选择成本滞后阈值
  selection_cost_hysteresis: 1.0
  # 路径选择障碍物成本缩放
  selection_obst_cost_scale: 1.0
  # 路径选择时间成本开关
  selection_alternative_time_cost: False
  # 路网图采样数
  roadmap_graph_no_samples: 15
  # 路网图宽度
  roadmap_graph_area_width: 5
  # 同伦特征缩放系数
  h_signature_prescaler: 0.5
  # 同伦特征判断阈值
  h_signature_threshold: 0.1
  # 障碍物关键点偏移
  obstacle_keypoint_offset: 0.1
  # 障碍物朝向阈值
  obstacle_heading_threshold: 0.45
  # 关闭同伦类图可视化
  visualize_hc_graph: False