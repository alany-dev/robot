DWAPlannerROS:
  # ========================== 机器人运动配置参数 ==========================
  # 机器人X轴方向（前进/后退）最大线速度
  # 单位：m/s；差分机器人仅X方向有效；值越大移动越快
  max_vel_x:  0.10  #0.22  #默认值：0.55
  # 机器人X轴方向最小线速度（负值代表后退）
  # 单位：m/s；控制后退速度上限
  min_vel_x: -0.10 #-0.22 #默认值：0.0

  # 机器人Y轴方向（左右平移）最大速度
  # 单位：m/s；差分驱动机器人无侧移能力，固定为0
  max_vel_y: 0.0
  # 机器人Y轴方向最小速度
  # 差分驱动机器人固定为0
  min_vel_y: 0.0

  # 机器人最大合平移速度（X方向，因Y方向无运动）
  # 单位：m/s；直线运动时的速度上限
  max_vel_trans:  0.10  #0.22 #默认值：0.55
  # 机器人最小合平移速度
  # 单位：m/s；防止速度过低导致机器人卡顿、无法移动
  min_vel_trans:  0.05 #0.11 #默认值：0.1

  # 机器人最大旋转角速度
  # 单位：rad/s；值越大转向越快
  max_vel_theta: 2.0 #2.75 #默认值：1.0
  # 机器人最小旋转角速度
  # 单位：rad/s；防止旋转速度过低导致转向卡顿
  min_vel_theta: 1.0 #1.37 #默认值：0.4

  # 机器人X轴方向线加速度限制
  # 单位：m/s²；控制加减速快慢，值越大启停越迅猛
  acc_lim_x: 2.5 #默认值：2.5
  # 机器人Y轴方向线加速度限制
  # 差分驱动机器人无侧移，固定为0
  acc_lim_y: 0.0 #默认值：2.5
  # 机器人旋转角加速度限制
  # 单位：rad/s²；控制转向加减速，值越大转向启停越迅猛
  acc_lim_theta: 3.2 #默认值：3.2

  # ========================== 目标点容忍度参数 ==========================
  # XY平面目标位置误差容忍度
  # 单位：m；机器人与目标点距离小于该值，判定为到达位置目标
  # 值越小定位越精准，但过小会导致机器人反复调整无法到达
  xy_goal_tolerance: 0.05 #默认值：0.10
  # 航向角（偏航角）目标容忍度
  # 单位：rad；机器人朝向与目标朝向差值小于该值，判定为到达朝向目标
  yaw_goal_tolerance: 0.17 #默认值：0.05
  # 是否锁定XY目标容忍度
  # false：机器人会边移动边调整姿态；true：到达XY位置后原地旋转调整朝向
  latch_xy_goal_tolerance: false #默认值：false

  # ========================== 前向轨迹仿真参数 ==========================
  # 轨迹前向仿真时间
  # 单位：s；DWA会预测该时间内的机器人运动轨迹
  # 太小：轨迹生硬、频繁拐弯；太大：轨迹平滑但响应滞后、易绕路
  sim_time: 2.0 #1.5 #默认值：1.7
  # X轴线速度采样数量
  # 规划时的速度候选值数量，越多轨迹规划越精细，CPU消耗越高
  vx_samples: 6 #20 #默认值：3
  # Y轴线速度采样数量
  # 差分机器人无侧移，固定为0
  vy_samples: 0 #默认值：10
  # 旋转角速度采样数量
  # 越多转向规划越灵活，CPU消耗越高
  vth_samples: 40 #40 #默认值：20
  # 本地控制器调用频率
  # 单位：Hz；DWA规划器的运行频率，需匹配硬件计算能力
  controller_frequency: 10.0 #默认值：20.0

  # ========================== 轨迹评分权重参数（核心调参） ==========================
  # 全局路径跟踪权重
  # 权重越大，机器人越严格贴合全局规划路径，偏离路径会快速修正
  path_distance_bias: 32.0 #32.0 #默认值：32.0
  # 局部目标趋近权重
  # 权重越大，机器人越优先靠近目标点，速度控制更流畅；过大会偏离全局路径
  goal_distance_bias: 20.0 #20.0 #默认值：24.0
  # 障碍物避障权重
  # 权重越大，机器人越优先远离障碍物，避障行为越激进
  occdist_scale: 0.01 #0.02 #默认值：0.01
  # 前向评分参考点距离
  # 单位：m；机器人前方该距离处设置评分点，优化轨迹直线性
  forward_point_distance: 0.325 #默认值：0.325
  # 碰撞前停止缓冲时间
  # 单位：s；轨迹规划预留的安全停止时间，防止碰撞
  stop_time_buffer: 0.2 #默认值：0.2
  # 启动机身缩放的速度阈值
  # 单位：m/s；机器人速度低于该值时，自动缩小避障半径
  scaling_speed: 0.25 #默认值：0.25
  # 机身最大缩放系数
  # 0~1；值越小，低速时避障半径越小，可通过更狭窄的空间
  max_scaling_factor: 0.2 #默认值：0.2

  # ========================== 防振荡参数 ==========================
  # 防振荡重置距离
  # 单位：m；机器人移动距离超过该值，清除振荡标记
  # 防止机器人在原地来回晃动、无法前进
  oscillation_reset_dist: 0.05 #默认值：0.05

  # ========================== 调试可视化参数 ==========================
  # 是否发布规划轨迹点云
  # 用于RViz可视化查看DWA生成的局部轨迹
  publish_traj_pc : true
  # 是否发布代价地图点云
  # 用于RViz可视化查看避障代价地图
  publish_cost_grid_pc: true

  # ========================== 机器人类型配置 ==========================
  # 是否为全向机器人
  # false：差分驱动机器人（两轮差速、阿克曼底盘，无侧移）
  # true：全向机器人（麦克纳姆轮、全向轮，可左右平移）
  holonomic_robot: false
   

